<!DOCTYPE html>
<html>
<head>
    <title>Chat Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; }
        #messages { border: 1px solid #ccc; height: 350px; overflow-y: scroll; padding: 15px; margin-bottom: 10px; background: white; border-radius: 8px; }
        input { padding: 12px; width: 60%; border: 1px solid #ddd; border-radius: 4px; }
        .send-btn { padding: 12px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        .clear-btn { background-color: #dc3545; color: white; border: none; margin-top: 20px; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h3>息抜きチャット</h3>
    <div id="messages">
        {% for msg in messages %}
            <div>{{ msg.content }}</div>
        {% endfor %}
    </div>
    <form method="POST">
        <input name="content" autocomplete="off" placeholder="メッセージを入力...">
        <button type="submit" class="send-btn">送信</button>
    </form>
    <form action="/clear" method="POST" onsubmit="return confirm('履歴を消去しますか？')">
        <button type="submit" class="clear-btn">履歴をすべてクリア</button>
    </form>
</body>
</html>
